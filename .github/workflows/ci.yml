name: CI

on:
  push:
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.8", "3.9", "3.10", "3.11", "3.12"]

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e ".[dev]"

    - name: Lint with flake8
      run: |
        # Stop the build if there are Python syntax errors or undefined names
        flake8 akash/ --exclude=akash/proto/ --count --select=E9,F63,F7,F82 --show-source --statistics
        # Exit with warnings for other issues (non-blocking for now)
        flake8 akash/ --exclude=akash/proto/ --count --exit-zero --statistics

    - name: Check code formatting with black
      run: |
        black --check akash/ --exclude=akash/proto/

    - name: Type check with mypy
      run: |
        pip install 'mypy<1.0'
        mypy akash/client.py akash/wallet.py akash/tx.py --ignore-missing-imports --disable-error-code=attr-defined --disable-error-code=no-any-return --disable-error-code=index --disable-error-code=assignment --disable-error-code=arg-type --disable-error-code=var-annotated --disable-error-code=unreachable --disable-error-code=name-defined --disable-error-code=operator --disable-error-code=dict-item --disable-error-code=call-overload --show-error-codes || echo "⚠️ mypy found issues but continuing"

    - name: Run unit tests
      run: |
        cd tests/unit && python run_all_tests.py